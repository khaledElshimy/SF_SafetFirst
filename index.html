<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Military Defense | SAAL</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #unity-container {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #unity-loading-bar {
        display: none;
      }

      #unity-warning {
        position: fixed;
        top: 10px; left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        font-family: sans-serif;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      var canvas          = document.querySelector("#unity-canvas");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner   = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        var div = document.createElement('div');
        div.innerHTML = msg;
        div.style.cssText = 'background:' + (type === 'error' ? 'red' : '#f5a623') + ';color:#fff;padding:8px 16px;border-radius:4px;margin:4px;';
        warningBanner.appendChild(div);
        if (type !== 'error') setTimeout(() => warningBanner.removeChild(div), 5000);
      }

      var buildUrl = "Build";
      var config = {
        dataUrl:            buildUrl + "/m-d.data",
        frameworkUrl:       buildUrl + "/m-d.framework.js",
        codeUrl:            buildUrl + "/m-d.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName:        "DefaultCompany",
        productName:        "Military-defense",
        productVersion:     "0.1",
        showBanner:         unityShowBanner,
      };

      // Mobile viewport
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name    = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.head.appendChild(meta);
      }

      var script  = document.createElement("script");
      script.src  = buildUrl + "/m-d.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).catch((msg) => console.error(msg));
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
