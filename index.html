<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Military-defense</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #000;
      }
      #unity-container {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
      }
      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      #unity-warning { display: none; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-warning"></div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        if (type === 'error') console.error(msg);
        else console.warn(msg);
      }

      var buildUrl = "Build";
      var config = {
        dataUrl:           buildUrl + "/m-d.data.unityweb",
        frameworkUrl:      buildUrl + "/m-d.framework.js.unityweb",
        codeUrl:           buildUrl + "/m-d.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName:       "DefaultCompany",
        productName:       "Military-defense",
        productVersion:    "0.1",
        showBanner:        unityShowBanner,
      };

      var script = document.createElement("script");
      script.src = buildUrl + "/m-d.loader.js"; // loader is never compressed
      script.onload = () => {
        createUnityInstance(canvas, config).catch((msg) => console.error(msg));
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
